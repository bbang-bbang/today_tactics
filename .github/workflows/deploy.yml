name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "key_lines=$(wc -l < ~/.ssh/deploy_key)"
          echo "key_head=$(head -1 ~/.ssh/deploy_key)"
          echo "key_tail=$(tail -1 ~/.ssh/deploy_key)"

      - name: Deploy
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -x
          echo "SSH_USER=$SSH_USER"
          echo "SSH_HOST=${SSH_HOST:0:8}..."
          # 연결 테스트 (verbose)
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -v \
              "$SSH_USER@$SSH_HOST" \
              "echo 'SSH_OK' && whoami && cd /opt/today_tactics && git stash && git pull && sudo -n systemctl restart today_tactics && sleep 3 && curl -sf -o /dev/null -w 'health=%{http_code}\n' http://127.0.0.1:5000/" \
              2>&1
