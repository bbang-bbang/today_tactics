name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # P7 하드닝: 배포키는 가비아 authorized_keys에서 forced command
          # (command="/bin/bash /opt/today_tactics/deploy/ci_deploy.sh",restrict)로 잠겨있음.
          # 아래 보내는 "ci-deploy"는 무시되고 ci_deploy.sh(fetch+reset+restart+health)만 실행.
          # 키 유출 시에도 임의 명령 불가 — 배포 트리거만 가능. 배포 로직 변경은 ci_deploy.sh에서.
          SSH_OUTPUT=$(ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              "$SSH_USER@$SSH_HOST" \
              "ci-deploy" \
              2>&1) && SSH_EXIT=0 || SSH_EXIT=$?

          echo "## 배포 결과 (exit $SSH_EXIT)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$SSH_OUTPUT" | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          exit $SSH_EXIT
