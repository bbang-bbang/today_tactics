name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          KEY_LINES=$(wc -l < ~/.ssh/deploy_key)
          KEY_HEAD=$(head -1 ~/.ssh/deploy_key)
          KEY_TAIL=$(tail -1 ~/.ssh/deploy_key)
          echo "## SSH Key 진단" >> $GITHUB_STEP_SUMMARY
          echo "- key_lines: $KEY_LINES" >> $GITHUB_STEP_SUMMARY
          echo "- key_head: $KEY_HEAD" >> $GITHUB_STEP_SUMMARY
          echo "- key_tail: $KEY_TAIL" >> $GITHUB_STEP_SUMMARY

      - name: Deploy
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          echo "## 연결 진단" >> $GITHUB_STEP_SUMMARY
          echo "- SSH_USER empty: $([ -z "$SSH_USER" ] && echo YES || echo NO)" >> $GITHUB_STEP_SUMMARY
          echo "- SSH_HOST empty: $([ -z "$SSH_HOST" ] && echo YES || echo NO)" >> $GITHUB_STEP_SUMMARY

          # P7 하드닝: 배포키는 가비아 authorized_keys에서 forced command(command="...ci_deploy.sh",restrict)로
          # 잠겨있음. 아래 보내는 명령은 무시되고 ci_deploy.sh(fetch+reset+restart+health)만 실행됨.
          # 즉 이 키가 유출돼도 임의 명령 불가 — 배포 트리거만 가능.
          SSH_OUTPUT=$(ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              "$SSH_USER@$SSH_HOST" \
              "ci-deploy" \
              2>&1) && SSH_EXIT=0 || SSH_EXIT=$?

          echo "- SSH exit code: $SSH_EXIT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$SSH_OUTPUT" | tail -30 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          exit $SSH_EXIT
